<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DarkOnion🍭 - Free Video Archive</title>
    <style>
        :root {
            --surface: rgba(26, 26, 26, 0.85);
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --card-bg: rgba(31, 31, 31, 0.9);
            --border: rgba(42, 42, 42, 0.6);
            --danger: #ef4444;
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light-mode {
            --surface: rgba(255, 255, 255, 0.85);
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.15);
            --card-bg: rgba(255, 255, 255, 0.9);
            --border: rgba(226, 216, 240, 0.5);
            --shadow: 0 4px 30px rgba(124, 58, 237, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            transition: color var(--transition);
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Анимированный градиентный фон */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: linear-gradient(
                135deg,
                #1a0033 0%,
                #2d004d 15%,
                #1a0033 30%,
                #3d0066 45%,
                #2d004d 60%,
                #4d007a 75%,
                #1a0033 100%
            );
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 50% 100%;
            }
            50% {
                background-position: 100% 50%;
            }
            75% {
                background-position: 50% 0%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Второй слой градиента для глубины */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(192, 132, 252, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(139, 92, 246, 0.12) 0%, transparent 50%);
            animation: overlayPulse 8s ease-in-out infinite;
        }

        @keyframes overlayPulse {
            0%, 100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        /* Лёгкая дымка поверх градиента */
        .mist-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 92, 246, 0.02) 2px,
                    rgba(139, 92, 246, 0.02) 4px
                );
            animation: mistFloat 20s linear infinite;
        }

        @keyframes mistFloat {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(-100%);
            }
        }

        /* Дневной режим — более светлые пурпурные тона */
        .light-mode .gradient-bg {
            background: linear-gradient(
                135deg,
                #f3e8ff 0%,
                #ede0ff 15%,
                #f3e8ff 30%,
                #e5d0ff 45%,
                #ede0ff 60%,
                #dcc4ff 75%,
                #f3e8ff 100%
            );
            background-size: 400% 400%;
        }

        .light-mode .gradient-overlay {
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(168, 85, 247, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(124, 58, 237, 0.06) 0%, transparent 50%);
        }

        .light-mode .mist-effect {
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(124, 58, 237, 0.02) 2px,
                    rgba(124, 58, 237, 0.02) 4px
                );
        }

        /* Фоновые сердечки, вишни и персики */
        .floating-icons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .floating-icon {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.2;
            animation: floatIcon 18s infinite ease-in-out;
            filter: blur(0.5px);
            transition: opacity var(--transition);
        }

        .light-mode .floating-icon {
            opacity: 0.15;
        }

        @keyframes floatIcon {
            0%,
            100% {
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
            }
            10% {
                transform: translateY(-25px) translateX(10px) rotate(5deg) scale(1.05);
            }
            20% {
                transform: translateY(-15px) translateX(-8px) rotate(-3deg) scale(0.95);
            }
            30% {
                transform: translateY(-40px) translateX(15px) rotate(8deg) scale(1.1);
            }
            40% {
                transform: translateY(-20px) translateX(-12px) rotate(-6deg) scale(0.9);
            }
            50% {
                transform: translateY(-35px) translateX(5px) rotate(4deg) scale(1.08);
            }
            60% {
                transform: translateY(-10px) translateX(-15px) rotate(-7deg) scale(0.92);
            }
            70% {
                transform: translateY(-45px) translateX(8px) rotate(6deg) scale(1.12);
            }
            80% {
                transform: translateY(-30px) translateX(-5px) rotate(-4deg) scale(0.96);
            }
            90% {
                transform: translateY(-18px) translateX(12px) rotate(3deg) scale(1.03);
            }
        }

        /* Оригинальные фоновые эмодзи (другие adult-символы) */
        .bg-emojis {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-emoji {
            position: absolute;
            font-size: 2rem;
            opacity: 0.05;
            animation: floatEmoji 20s infinite ease-in-out;
            transition: opacity var(--transition);
        }

        .light-mode .bg-emoji {
            opacity: 0.03;
        }

        @keyframes floatEmoji {
            0%,
            100% {
                transform: translateY(0) rotate(0deg) scale(1);
            }
            15% {
                transform: translateY(-30px) rotate(5deg) scale(1.1);
            }
            30% {
                transform: translateY(-15px) rotate(-3deg) scale(0.95);
            }
            45% {
                transform: translateY(-40px) rotate(7deg) scale(1.05);
            }
            60% {
                transform: translateY(-10px) rotate(-5deg) scale(0.9);
            }
            75% {
                transform: translateY(-35px) rotate(3deg) scale(1.08);
            }
            90% {
                transform: translateY(-20px) rotate(-2deg) scale(1);
            }
        }

        /* Основной контейнер */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border-radius: 24px;
            padding: 28px 20px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            transition: all var(--transition);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Переключатель темы */
        .theme-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .theme-toggle:active {
            transform: scale(0.94);
            transition: transform 0.1s;
        }

        /* Заголовок */
        .title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            margin-top: 8px;
            background: linear-gradient(135deg, #a78bfa, #c084fc, #e9d5ff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
            background-size: 200% 200%;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* Описание */
        .description {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px 14px;
            margin: 16px 0 20px;
            border: 1px solid var(--border);
            text-align: left;
            transition: all var(--transition);
        }

        .description p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin: 0;
            padding: 2px 0;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .description .icon {
            flex-shrink: 0;
            font-size: 1.1rem;
            margin-top: 1px;
        }

        /* Контейнер для кнопок */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }

        /* Кнопка Free Archive */
        .cta-button {
            display: block;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            color: #ffffff;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: all var(--transition);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.4);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(139, 92, 246, 0.5);
        }

        .cta-button:active {
            transform: scale(0.96);
            box-shadow: 0 3px 12px rgba(139, 92, 246, 0.3);
            transition: all 0.1s;
        }

        /* Кнопка Buy Archive */
        .buy-button {
            display: block;
            width: 100%;
            padding: 16px 24px;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .buy-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .buy-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .buy-button:hover {
            background: rgba(139, 92, 246, 0.08);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.2);
            transform: translateY(-2px);
        }

        .buy-button:active {
            transform: scale(0.96);
            background: rgba(139, 92, 246, 0.15);
            transition: all 0.1s;
        }

        /* Подвал */
        .footer-note {
            margin-top: 14px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.7;
            transition: color var(--transition);
        }

        .footer-note span {
            color: var(--accent);
        }

        /* Адаптивность */
        @media (max-width: 380px) {
            .container {
                padding: 20px 14px 18px;
                border-radius: 20px;
            }
            .title {
                font-size: 1.8rem;
            }
            .description p {
                font-size: 0.82rem;
            }
            .cta-button,
            .buy-button {
                font-size: 1rem;
                padding: 14px 20px;
            }
        }

        @media (min-width: 500px) {
            .container {
                border-radius: 28px;
                padding: 32px 28px 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Анимированный градиентный фон -->
    <div class="gradient-bg"></div>
    <div class="gradient-overlay"></div>
    <div class="mist-effect"></div>

    <!-- Плавающие сердечки, вишни и персики (20% прозрачности) -->
    <div class="floating-icons" id="floatingIcons"></div>

    <!-- Остальные фоновые эмодзи -->
    <div class="bg-emojis" id="bgEmojis"></div>

    <!-- Основной контейнер -->
    <div class="container">
        <!-- Переключатель темы -->
        <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
            🌙
        </button>

        <!-- Название -->
        <h1 class="title">DarkOnion🍭</h1>

        <!-- Описание -->
        <div class="description">
            <p><span class="icon">🍬</span>Large archive of video and photo materials.</p>
            <p><span class="icon">📲</span>Completely anonymous download and viewing via VLC Player.</p>
            <p><span class="icon">🎬</span>Free video archive.</p>
            <p><span class="icon">🪙</span>Anonymous payment via cryptocurrency.</p>
        </div>

        <!-- Кнопки -->
        <div class="buttons-container">
            <a href="https://t.me/mysavevidking/3" class="cta-button" target="_blank" rel="noopener noreferrer">
                🗂️ Free Archive
            </a>
            <a href="https://t.me/kingprojectshopbot" class="buy-button" target="_blank" rel="noopener noreferrer">
                🛒 Buy Archive
            </a>
        </div>

        <!-- Подвал -->
        <p class="footer-note">
            🔒 End-to-end encrypted · <span>Anonymous</span> by design
        </p>
    </div>

    <script>
        (function() {
            // --- Переключение темы ---
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;

            // Проверяем сохранённую тему или системные настройки
            const savedTheme = localStorage.getItem('darkonion-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
                body.classList.add('light-mode');
                themeToggle.textContent = '☀️';
            }

            themeToggle.addEventListener('click', () => {
                body.classList.toggle('light-mode');
                const isLight = body.classList.contains('light-mode');
                themeToggle.textContent = isLight ? '☀️' : '🌙';
                localStorage.setItem('darkonion-theme', isLight ? 'light' : 'dark');
            });

            // --- Генерация сердечек, вишен и персиков (20% прозрачности) ---
            const fruitIcons = ['❤️', '🍒', '🍑', '💕', '🩷', '💗', '💖', '💝', '💞', '💓'];
            const floatingContainer = document.getElementById('floatingIcons');
            const fruitCount = 25;

            for (let i = 0; i < fruitCount; i++) {
                const icon = document.createElement('span');
                icon.classList.add('floating-icon');
                icon.textContent = fruitIcons[Math.floor(Math.random() * fruitIcons.length)];

                // Случайное позиционирование
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = 2 + Math.random() * 3.5; // rem
                const duration = 12 + Math.random() * 24;
                const delay = Math.random() * 18;

                icon.style.left = `${x}%`;
                icon.style.top = `${y}%`;
                icon.style.fontSize = `${size}rem`;
                icon.style.animationDuration = `${duration}s`;
                icon.style.animationDelay = `${delay}s`;

                floatingContainer.appendChild(icon);
            }

            // --- Генерация остальных фоновых эмодзи ---
            const adultEmojis = [
                '🍆', '🌶️', '🔥', '💋', '👅', '💦', '🫦', '👄',
                '🍌', '🍩', '🍭', '🕯️', '🌹', '🥀', '💜', '🖤', '⛓️', '🔗',
                '🗝️', '🪢', '🎭', '👁️', '💎', '🍷', '🥂', '💄', '🩸', '🌙',
                '⭐', '✨', '💫', '🕸️', '🦇', '🐍', '🔮', '📿', '💀', '👑'
            ];

            const bgContainer = document.getElementById('bgEmojis');
            const emojiCount = 35;

            for (let i = 0; i < emojiCount; i++) {
                const emoji = document.createElement('span');
                emoji.classList.add('bg-emoji');
                emoji.textContent = adultEmojis[Math.floor(Math.random() * adultEmojis.length)];

                // Случайное позиционирование
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = 1.2 + Math.random() * 2.8; // rem
                const duration = 15 + Math.random() * 25;
                const delay = Math.random() * 15;

                emoji.style.left = `${x}%`;
                emoji.style.top = `${y}%`;
                emoji.style.fontSize = `${size}rem`;
                emoji.style.animationDuration = `${duration}s`;
                emoji.style.animationDelay = `${delay}s`;

                bgContainer.appendChild(emoji);
            }

            // --- Адаптация под Telegram Mini App ---
            // Поддержка изменения темы из Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();

                // Синхронизация с темой Telegram
                if (tg.colorScheme === 'light' && !body.classList.contains('light-mode')) {
                    body.classList.add('light-mode');
                    themeToggle.textContent = '☀️';
                } else if (tg.colorScheme === 'dark' && body.classList.contains('light-mode')) {
                    body.classList.remove('light-mode');
                    themeToggle.textContent = '🌙';
                }

                // Слушаем изменения темы в реальном времени
                tg.onEvent('themeChanged', () => {
                    if (tg.colorScheme === 'light') {
                        body.classList.add('light-mode');
                        themeToggle.textContent = '☀️';
                    } else {
                        body.classList.remove('light-mode');
                        themeToggle.textContent = '🌙';
                    }
                    localStorage.setItem('darkonion-theme', tg.colorScheme);
                });

                // Настройка кнопки "Назад" в Telegram
                tg.BackButton.show();
                tg.BackButton.onClick(() => {
                    window.history.back();
                });
            }

            // Обработка кнопки Free Archive
            const ctaButton = document.querySelector('.cta-button');
            ctaButton.addEventListener('click', function(e) {
                // Анимация нажатия
                this.style.transform = 'scale(0.94)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);

                // Для Telegram Mini App — открываем ссылку
                if (window.Telegram && window.Telegram.WebApp) {
                    e.preventDefault();
                    window.Telegram.WebApp.openTelegramLink(
                        'https://t.me/mysavevidking/3');
                }
            });

            // Обработка кнопки Buy Archive
            const buyButton = document.querySelector('.buy-button');
            buyButton.addEventListener('click', function(e) {
                // Анимация нажатия
                this.style.transform = 'scale(0.94)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);

                // Для Telegram Mini App — открываем ссылку
                if (window.Telegram && window.Telegram.WebApp) {
                    e.preventDefault();
                    window.Telegram.WebApp.openTelegramLink(
                        'https://t.me/kingprojectshopbot');
                }
            });

            console.log('🍭 DarkOnion landing ready');
        })();
    </script>
</body>
</html>
